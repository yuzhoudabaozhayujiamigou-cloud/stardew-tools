<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Secret Note 19 annotated route schematic</title>
  <desc id="desc">An original schematic showing the route logic from 1 Willow Lane to the hidden statue behind Mayor Lewis's house. It is not a scale map or gameplay screenshot.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#b14f3a" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f7f1de" />
  <rect x="0" y="0" width="1200" height="112" fill="#315f55" />
  <text x="54" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Secret Note 19: route logic</text>
  <text x="54" y="87" font-family="Arial, sans-serif" font-size="18" fill="#dceee8">Original annotated schematic - not to scale - no game assets used</text>

  <rect x="54" y="152" width="760" height="454" rx="8" fill="#dce7c8" stroke="#315f55" stroke-width="3" />
  <path d="M78 358 H790 M420 176 V582" stroke="#ddd3ba" stroke-width="58" />
  <path d="M78 358 H790 M420 176 V582" stroke="#ffffff" stroke-width="4" stroke-dasharray="18 16" />

  <rect x="112" y="432" width="224" height="112" rx="8" fill="#f2c36b" stroke="#68452d" stroke-width="3" />
  <path d="M98 432 L224 356 L350 432 Z" fill="#a85d43" stroke="#68452d" stroke-width="3" />
  <rect x="205" y="492" width="42" height="52" fill="#68452d" />
  <text x="128" y="578" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#3b3126">1 Willow Lane</text>

  <rect x="568" y="194" width="196" height="110" rx="8" fill="#c8a4d8" stroke="#51405d" stroke-width="3" />
  <path d="M552 194 L666 132 L780 194 Z" fill="#6f617f" stroke="#51405d" stroke-width="3" />
  <text x="580" y="332" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#3b3126">Mayor's house</text>

  <circle cx="224" cy="414" r="18" fill="#2f8f4e" stroke="#ffffff" stroke-width="5" />
  <text x="94" y="396" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#245139">START: front door tile</text>
  <circle cx="666" cy="164" r="20" fill="#e2aa2c" stroke="#ffffff" stroke-width="5" />
  <text x="704" y="158" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#6b4215">END: interact with ground</text>

  <path d="M205 414 H106 V235 H390 V176 H520 V334 H780 V164 H692" fill="none" stroke="#b14f3a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
  <g fill="#b14f3a">
    <circle cx="106" cy="414" r="7" /><circle cx="106" cy="235" r="7" /><circle cx="390" cy="235" r="7" />
    <circle cx="390" cy="176" r="7" /><circle cx="520" cy="176" r="7" /><circle cx="520" cy="334" r="7" />
    <circle cx="780" cy="334" r="7" /><circle cx="780" cy="164" r="7" />
  </g>

  <rect x="850" y="152" width="296" height="454" rx="8" fill="#ffffff" stroke="#315f55" stroke-width="3" />
  <text x="880" y="202" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#253b36">How to use the note</text>
  <circle cx="884" cy="252" r="16" fill="#2f8f4e" /><text x="879" y="259" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1</text>
  <text x="916" y="248" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">Stand directly in front</text><text x="916" y="273" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">of 1 Willow Lane.</text>
  <circle cx="884" cy="326" r="16" fill="#3f78a8" /><text x="879" y="333" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2</text>
  <text x="916" y="322" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">For every arrow, walk</text><text x="916" y="347" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">until a permanent obstacle.</text>
  <circle cx="884" cy="400" r="16" fill="#b14f3a" /><text x="879" y="407" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">3</text>
  <text x="916" y="396" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">Do not stop early or cut</text><text x="916" y="421" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">across the next turn.</text>
  <circle cx="884" cy="474" r="16" fill="#e2aa2c" /><text x="879" y="481" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">4</text>
  <text x="916" y="470" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">At the endpoint, interact</text><text x="916" y="495" font-family="Arial, sans-serif" font-size="18" fill="#3b3126">with the ground.</text>
  <rect x="880" y="528" width="236" height="50" rx="8" fill="#fff0b8" stroke="#b77b1c" stroke-width="2" />
  <text x="898" y="560" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#6b4215">Reward: Solid Gold Lewis statue</text>
  <text x="54" y="646" font-family="Arial, sans-serif" font-size="15" fill="#5d5548">StardewProfit editorial visual - mechanics reviewed July 20, 2026</text>
</svg>
