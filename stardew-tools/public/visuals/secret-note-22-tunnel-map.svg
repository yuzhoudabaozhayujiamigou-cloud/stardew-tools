<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Secret Note 22 Bus Tunnel panel schematic</title>
  <desc id="desc">An original annotated schematic showing the Bus Stop, westbound tunnel route, center wall panel, and Battery Pack interaction for the Mysterious Qi quest.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#cf5f42" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#eef3ef" />
  <rect width="1200" height="112" fill="#233d50" />
  <text x="54" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Secret Note 22: Bus Tunnel panel</text>
  <text x="54" y="87" font-family="Arial, sans-serif" font-size="18" fill="#d7e5ed">Original annotated schematic - not to scale - no game assets used</text>

  <rect x="54" y="156" width="1092" height="420" rx="8" fill="#ffffff" stroke="#233d50" stroke-width="3" />
  <rect x="88" y="204" width="302" height="322" rx="8" fill="#dceacb" stroke="#527047" stroke-width="3" />
  <text x="118" y="246" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#30482d">Bus Stop</text>
  <rect x="160" y="296" width="148" height="82" rx="8" fill="#e7b751" stroke="#60441e" stroke-width="3" />
  <circle cx="194" cy="386" r="20" fill="#3b4551" /><circle cx="276" cy="386" r="20" fill="#3b4551" />
  <rect x="182" y="270" width="60" height="36" fill="#9cc3d6" stroke="#60441e" stroke-width="3" />
  <text x="120" y="456" font-family="Arial, sans-serif" font-size="18" fill="#30482d">Walk west from the bus</text>

  <path d="M420 250 H1096 V498 H420 Z" fill="#4b4f54" stroke="#24282c" stroke-width="4" />
  <path d="M444 374 H1070" stroke="#d2c785" stroke-width="8" stroke-dasharray="28 20" />
  <text x="454" y="292" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff">The Tunnel</text>
  <text x="454" y="322" font-family="Arial, sans-serif" font-size="17" fill="#d9d9d9">Continue to the wall box near the center</text>

  <path d="M340 412 H720" fill="none" stroke="#cf5f42" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)" />
  <rect x="736" y="266" width="92" height="116" rx="8" fill="#9bc3d5" stroke="#17374a" stroke-width="4" />
  <rect x="758" y="290" width="48" height="50" rx="4" fill="#f3d26a" stroke="#675014" stroke-width="3" />
  <path d="M772 315 H792 M782 305 V325" stroke="#675014" stroke-width="5" />
  <text x="846" y="304" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#ffffff">Wall panel</text>
  <text x="846" y="334" font-family="Arial, sans-serif" font-size="17" fill="#d9d9d9">Interact while carrying</text>
  <text x="846" y="358" font-family="Arial, sans-serif" font-size="17" fill="#d9d9d9">one Battery Pack</text>

  <rect x="104" y="494" width="250" height="54" rx="8" fill="#fff0b8" stroke="#b77b1c" stroke-width="2" />
  <rect x="122" y="507" width="34" height="28" rx="3" fill="#3f78a8" />
  <path d="M132 521 H146 M139 514 V528" stroke="#ffffff" stroke-width="3" />
  <text x="170" y="528" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#6b4215">Bring: 1 Battery Pack</text>

  <rect x="54" y="598" width="1092" height="46" rx="8" fill="#dce9f0" stroke="#62829a" stroke-width="2" />
  <text x="78" y="627" font-family="Arial, sans-serif" font-size="17" fill="#233d50">Result: starts The Mysterious Qi quest. Finding Secret Note 22 is helpful, but the panel can be activated without first finding the note.</text>
  <text x="54" y="664" font-family="Arial, sans-serif" font-size="15" fill="#5d5548">StardewProfit editorial visual - mechanics reviewed July 20, 2026</text>
</svg>
