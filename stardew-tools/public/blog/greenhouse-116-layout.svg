<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Greenhouse 116 Tile Layout</title>
  <desc id="desc">Diagram of a greenhouse with 116 crop tiles and sprinkler zones for Stardew Valley.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecf8df" />
      <stop offset="100%" stop-color="#c9e8aa" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <text x="70" y="86" font-family="Georgia, serif" font-size="42" fill="#274b2b" font-weight="700">
    Greenhouse 116-Tile Master Layout
  </text>
  <text x="70" y="122" font-family="Arial, sans-serif" font-size="22" fill="#3a6a3e">
    6 Iridium Sprinklers + Workflow Lanes + Year-Round Crop Engine
  </text>

  <rect x="120" y="170" width="960" height="380" rx="28" fill="#ffffff" stroke="#4e7a32" stroke-width="6" />

  <g fill="#7fb46a" stroke="#5f8a45" stroke-width="1">
    <rect x="170" y="220" width="860" height="280" rx="16" fill="#edf7e6" />
    <g fill="#76b65c">
      <circle cx="260" cy="270" r="10" />
      <circle cx="420" cy="270" r="10" />
      <circle cx="580" cy="270" r="10" />
      <circle cx="740" cy="270" r="10" />
      <circle cx="900" cy="270" r="10" />

      <circle cx="260" cy="350" r="10" />
      <circle cx="420" cy="350" r="10" />
      <circle cx="580" cy="350" r="10" />
      <circle cx="740" cy="350" r="10" />
      <circle cx="900" cy="350" r="10" />

      <circle cx="260" cy="430" r="10" />
      <circle cx="420" cy="430" r="10" />
      <circle cx="580" cy="430" r="10" />
      <circle cx="740" cy="430" r="10" />
      <circle cx="900" cy="430" r="10" />
    </g>
  </g>

  <g fill="#4d85c8" stroke="#2f5f9a" stroke-width="2">
    <rect x="340" y="300" width="18" height="18" rx="3" />
    <rect x="500" y="300" width="18" height="18" rx="3" />
    <rect x="660" y="300" width="18" height="18" rx="3" />
    <rect x="340" y="380" width="18" height="18" rx="3" />
    <rect x="500" y="380" width="18" height="18" rx="3" />
    <rect x="660" y="380" width="18" height="18" rx="3" />
  </g>

  <g font-family="Arial, sans-serif" font-size="20" fill="#274b2b" font-weight="700">
    <text x="160" y="590">116 Crop Tiles</text>
    <text x="370" y="590">6 Sprinklers</text>
    <text x="530" y="590">Flexible Crop Mix</text>
    <text x="810" y="590">Optimized Harvest Routing</text>
