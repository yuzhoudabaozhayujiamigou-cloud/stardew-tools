<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Artisan Goods Empire Pipeline</title>
  <desc id="desc">Diagram showing crop inputs flowing into kegs and jars, then into storage and sales loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1d6" />
      <stop offset="100%" stop-color="#f2cf98" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <text x="62" y="86" font-family="Georgia, serif" font-size="42" fill="#4a321e" font-weight="700">
    Artisan Goods Empire Pipeline
  </text>
  <text x="62" y="124" font-family="Arial, sans-serif" font-size="22" fill="#6f4b2a">
    Inputs -> Processing -> Storage -> Sales -> Reinvestment
  </text>

  <g font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#4a321e">
    <rect x="70" y="210" width="200" height="220" rx="24" fill="#fff8ea" stroke="#8a5b3a" stroke-width="4" />
    <text x="112" y="260">Inputs</text>
    <text x="98" y="302" font-size="18" font-weight="600">Crops</text>
    <text x="98" y="332" font-size="18" font-weight="600">Honey</text>
    <text x="98" y="362" font-size="18" font-weight="600">Animal Goods</text>

    <rect x="330" y="170" width="240" height="300" rx="24" fill="#fff8ea" stroke="#8a5b3a" stroke-width="4" />
    <text x="392" y="220">Processing</text>
    <text x="370" y="268" font-size="18" font-weight="600">Keg Lanes</text>
    <text x="370" y="298" font-size="18" font-weight="600">Jar Lanes</text>
    <text x="370" y="328" font-size="18" font-weight="600">Cycle Control</text>
    <text x="370" y="358" font-size="18" font-weight="600">Resin/Bar Supply</text>

    <rect x="640" y="210" width="200" height="220" rx="24" fill="#fff8ea" stroke="#8a5b3a" stroke-width="4" />
    <text x="688" y="260">Storage</text>
    <text x="670" y="302" font-size="18" font-weight="600">Output Chests</text>
    <text x="670" y="332" font-size="18" font-weight="600">Backlog Audit</text>
    <text x="670" y="362" font-size="18" font-weight="600">Routing</text>

    <rect x="900" y="210" width="220" height="220" rx="24" fill="#fff8ea" stroke="#8a5b3a" stroke-width="4" />
    <text x="978" y="260">Sales</text>
    <text x="934" y="302" font-size="18" font-weight="600">Cash Buffer</text>
    <text x="934" y="332" font-size="18" font-weight="600">Reinvestment</text>
    <text x="934" y="362" font-size="18" font-weight="600">Expansion Waves</text>
  </g>

  <g stroke="#8a5b3a" stroke-width="6" fill="none">
    <path d="M275 320 H320" />
    <path d="M575 320 H630" />
    <path d="M845 320 H890" />
  </g>

  <text x="70" y="560" font-family="Arial, sans-serif" font-size="20" fill="#5c3d23" font-weight="700">
    Build consistency first, then scale machine count.
  </text>
</svg>
