<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stardew Valley Year 1 Profit Roadmap</title>
  <desc id="desc">A roadmap showing Spring, Summer, Fall, and Winter priorities for Year 1 profit scaling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf2d4" />
      <stop offset="100%" stop-color="#f4d7a1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <text x="60" y="84" font-family="Georgia, serif" font-size="42" fill="#4a321e" font-weight="700">
    Year 1 Profit Roadmap
  </text>
  <text x="60" y="122" font-family="Arial, sans-serif" font-size="22" fill="#6f4b2a">
    Cash Flow -> Throughput -> Conversion -> Infrastructure
  </text>

  <g font-family="Arial, sans-serif" font-size="20" fill="#4a321e">
    <rect x="60" y="170" width="250" height="360" rx="24" fill="#fff9ea" stroke="#8a5b3a" stroke-width="3" />
    <text x="85" y="215" font-size="30" font-weight="700">Spring</text>
    <text x="85" y="252">- Build liquidity</text>
    <text x="85" y="286">- Early mining</text>
    <text x="85" y="320">- Seed discipline</text>
    <text x="85" y="354">- Starter machines</text>

    <rect x="340" y="170" width="250" height="360" rx="24" fill="#fff9ea" stroke="#8a5b3a" stroke-width="3" />
    <text x="365" y="215" font-size="30" font-weight="700">Summer</text>
    <text x="365" y="252">- Expand throughput</text>
    <text x="365" y="286">- Keep ore flow</text>
    <text x="365" y="320">- Stabilize routines</text>
    <text x="365" y="354">- Grow processing</text>

    <rect x="620" y="170" width="250" height="360" rx="24" fill="#fff9ea" stroke="#8a5b3a" stroke-width="3" />
    <text x="645" y="215" font-size="30" font-weight="700">Fall</text>
    <text x="645" y="252">- Max conversion</text>
    <text x="645" y="286">- Avoid backlog</text>
    <text x="645" y="320">- Pipeline reset</text>
    <text x="645" y="354">- Capital compounding</text>

    <rect x="900" y="170" width="250" height="360" rx="24" fill="#fff9ea" stroke="#8a5b3a" stroke-width="3" />
    <text x="925" y="215" font-size="30" font-weight="700">Winter</text>
    <text x="925" y="252">- Bottleneck cleanup</text>
    <text x="925" y="286">- Mass crafting</text>
    <text x="925" y="320">- Resin and bars</text>
    <text x="925" y="354">- Year 2 launch prep</text>
  </g>

  <g stroke="#8a5b3a" stroke-width="5" fill="none">
    <path d="M315 350 H335" />
    <path d="M595 350 H615" />
    <path d="M875 350 H895" />
  </g>
</svg>
