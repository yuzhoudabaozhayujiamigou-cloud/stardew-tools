<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
 <title>Quiet Room</title>
 <style>
 html, body {
 margin: 0; padding: 0; background: #040405; height: 100vh;
 overflow: hidden; overscroll-behavior: none;
 display: flex; justify-content: center; align-items: center;
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 }
 .breathe-orb {
 position: absolute; width: 200px; height: 200px; border-radius: 50%;
 background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 70%);
 pointer-events: none; opacity: 0; transition: opacity 12s ease-in-out;
 }
 #void-input {
 background: transparent; border: none; color: rgba(255, 255, 255, 0.4);
 font-size: 1.1rem; font-weight: 300; text-align: center; width: 80%;
 outline: none; resize: none; caret-color: rgba(255, 255, 255, 0.15);
 letter-spacing: 1px; z-index: 10;
 transition: all 4s cubic-bezier(0.25, 1, 0.5, 1);
 }
 #void-input::placeholder { color: rgba(255, 255, 255, 0.08); transition: opacity 2s; }

 .surrendered {
 transform: translateY(40px) scale(0.95); opacity: 0 !important;
 filter: blur(15px); pointer-events: none;
 }
 .resetting { transition: all 2s ease-out; }
 </style>
</head>
<body>
 <div class="breathe-orb" id="orb"></div>
 <textarea id="void-input" rows="1" placeholder="Type it out, or just be..."></textarea>

 <script>
 class PhysiologicalAudioEngine {
 constructor() {
 this.ctx = new (window.AudioContext || window.webkitAudioContext)();
 this.masterGain = this.ctx.createGain();
 this.masterGain.connect(this.ctx.destination);
 this.masterGain.gain.value = 0;
 }
 createBrownNoise() {
 const bufferSize = 2 * this.ctx.sampleRate;
 const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
 const output = buffer.getChannelData(0);
 let lastOut = 0;
 for (let i = 0; i < bufferSize; i++) {
 const white = Math.random() * 2 - 1;
 output[i] = (lastOut + (0.02 * white)) / 1.02;
 lastOut = output[i];
 output[i] = Math.max(-0.6, Math.min(0.6, output[i] * 3.0));
 }
 const brownNoise = this.ctx.createBufferSource();
 brownNoise.buffer = buffer; brownNoise.loop = true; return brownNoise;
 }
 startRegulation(bpm = 4.8) {
 if (this.ctx.state === 'suspended') this.ctx.resume();
 this.noise = this.createBrownNoise();
 const lowPass = this.ctx.createBiquadFilter();
 lowPass.type = 'lowpass'; lowPass.frequency.value = 350;
 const breathGain = this.ctx.createGain(); breathGain.gain.value = 0.4;

 const lfo = this.ctx.createOscillator();
 lfo.type = 'sine'; lfo.frequency.value = bpm / 60;
 const lfoDepth = this.ctx.createGain(); lfoDepth.gain.value = 0.35;

 lfo.connect(lfoDepth); lfoDepth.connect(breathGain.gain);
 this.noise.connect(lowPass); lowPass.connect(breathGain);
 breathGain.connect(this.masterGain);
 this.noise.start(); lfo.start(); this.lfo = lfo;

 const now = this.ctx.currentTime;
 this.masterGain.gain.setValueAtTime(0.001, now);
 this.masterGain.gain.exponentialRampToValueAtTime(0.8, now + 12);
 }
 stopRegulation() {
 if (!this.noise) return;
 const now = this.ctx.currentTime;
 this.masterGain.gain.cancelScheduledValues(now);
 this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, now);
 this.masterGain.gain.exponentialRampToValueAtTime(0.001, now + 8);
 setTimeout(() => {
 this.noise.stop(); this.lfo.stop(); this.ctx.suspend();
 }, 8500);
 }
 }

 const input = document.getElementById('void-input');
 const orb = document.getElementById('orb');
 let typingTimer; let engine = null; let isRegulating = false; let contextUnlocked = false;

 const unlockContext = () => {
 if (!contextUnlocked) {
 engine = new PhysiologicalAudioEngine();
 engine.ctx.resume(); contextUnlocked = true;
 document.removeEventListener('touchstart', unlockContext);
 }
 };
 document.addEventListener('touchstart', unlockContext, {passive: true});
 input.addEventListener('focus', unlockContext);

 input.addEventListener('input', function() {
 if(!contextUnlocked) unlockContext();
 this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
 clearTimeout(typingTimer);
 if (this.value.trim() !== '' && !isRegulating) {
 typingTimer = setTimeout(triggerSurrender, 3000);
 }
 });

 function triggerSurrender() {
 isRegulating = true; input.blur();
 try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); } catch(e){}

 input.classList.add('surrendered');
 if(engine) {
 engine.startRegulation(4.5);
 orb.style.opacity = 1;
 setTimeout(() => { input.value = ''; input.style.height = 'auto'; }, 4000);
 }
 }

 document.addEventListener('click', (e) => {
 if (isRegulating && e.target !== input) {
 isRegulating = false;
 orb.style.opacity = 0;
 if(engine) engine.stopRegulation();

 input.classList.remove('surrendered');
 input.classList.add('resetting');
 setTimeout(() => { input.classList.remove('resetting'); }, 2000);
 }
 });
 </script>
</body>
</html>
